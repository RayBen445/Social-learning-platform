<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle (optional, remove for transparent) -->
  <!-- <circle cx="128" cy="128" r="128" fill="white"/> -->
  
  <!-- Main Logo Shape - Three interconnected circles representing learning community -->
  <!-- Top circle - Knowledge/Growth -->
  <circle cx="128" cy="64" r="32" fill="url(#logoGradient)" opacity="0.95"/>
  
  <!-- Bottom left circle - Community/Support -->
  <circle cx="64" cy="192" r="32" fill="url(#logoGradient)" opacity="0.85"/>
  
  <!-- Bottom right circle - Achievement/Success -->
  <circle cx="192" cy="192" r="32" fill="url(#logoGradient)" opacity="0.75"/>
  
  <!-- Connecting lines - representing the "loop" of continuous learning -->
  <!-- Left connection -->
  <path
    d="M 128 96 Q 96 128 64 160"
    stroke="url(#accentGradient)"
    stroke-width="6"
    fill="none"
    stroke-linecap="round"
    opacity="0.7"
  />
  
  <!-- Right connection -->
  <path
    d="M 128 96 Q 160 128 192 160"
    stroke="url(#accentGradient)"
    stroke-width="6"
    fill="none"
    stroke-linecap="round"
    opacity="0.7"
  />
  
  <!-- Bottom connection -->
  <path
    d="M 64 224 L 192 224"
    stroke="url(#accentGradient)"
    stroke-width="6"
    fill="none"
    stroke-linecap="round"
    opacity="0.6"
  />
  
  <!-- Center accent dot -->
  <circle cx="128" cy="128" r="8" fill="url(#logoGradient)" opacity="1"/>
  
  <!-- Decorative elements - representing connectivity -->
  <!-- Top left spark -->
  <circle cx="96" cy="80" r="4" fill="url(#accentGradient)" opacity="0.8"/>
  
  <!-- Top right spark -->
  <circle cx="160" cy="80" r="4" fill="url(#accentGradient)" opacity="0.8"/>
  
  <!-- Bottom spark -->
  <circle cx="128" cy="224" r="4" fill="url(#accentGradient)" opacity="0.8"/>
</svg>
